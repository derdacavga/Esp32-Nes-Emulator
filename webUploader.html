<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom ESP32 Web Flasher</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #6c757d; }
        #log { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 4px; height: 200px; overflow-y: scroll; font-family: monospace; margin-top: 20px; white-space: pre-wrap; }
    </style>
    <script type="module">
        import { ESPLoader, Transport } from 'https://unpkg.com/esptool-js@0.4.6/bundle.js';

        let device = null;
        let transport = null;
        let esploader = null;

        const logElement = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        const flashBtn = document.getElementById('flashBtn');

        function log(msg) {
            logElement.textContent += msg + '\n';
            logElement.scrollTop = logElement.scrollHeight;
        }

        connectBtn.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                transport = new Transport(port);
                
                log("Connecting to ESP32...");
                
                esploader = new ESPLoader({
                    transport: transport,
                    baudrate: 115200,
                    terminal: {
                        clean: () => { logElement.textContent = ''; },
                        writeLine: (msg) => log(msg),
                        write: (msg) => log(msg)
                    }
                });
                
                const chipName = await esploader.main();
                
                log(`\n🎉 Connected Successfully to: ${chipName}`);
                flashBtn.disabled = false;
            } catch (err) {
                log(`Error: ${err.message}`);
                console.error(err);
            }
        });


        flashBtn.addEventListener('click', async () => {
            try {
                flashBtn.disabled = true;
                log("Fetching firmware from server...");
                
                const response = await fetch('https://raw.githubusercontent.com/derdacavga/Esp32-Nes-Emulator/main/firmware.bin');
                if (!response.ok) throw new Error("Failed to fetch firmware file.");
                
        const buffer = await response.arrayBuffer();
        const firmwareArray = new Uint8Array(buffer);

        let binaryString = "";
        for (let i = 0; i < firmwareArray.length; i++) {
            binaryString += String.fromCharCode(firmwareArray[i]);
        }

        log("Flashing firmware to address 0x10000...");
        const fileArray = [{ data: binaryString, address: 0x10000 }];
        
        await esploader.writeFlash({
            fileArray: fileArray,
            flashSize: 'keep',
            eraseAll: false,
            compress: true,
            reportProgress: (fileIndex, written, total) => {
                const percent = ((written / total) * 100).toFixed(1);
                log(`Progress: ${percent}%`);
            }
        });

        log("SUCCESS! Flashing completed.");
        
        log("Rebooting ESP32 into app...");
                await transport.setDTR(false);
                await new Promise(resolve => setTimeout(resolve, 100));
                await transport.setDTR(true);
                log("Done!");
                
            } catch (err) {
                log(`Flashing failed: ${err.message}`);
            } finally {
                flashBtn.disabled = false;
            }
        });
</script>
</head>
<body>

<div class="container">
    <h2>ESP32 Web Flasher Tool</h2>
    <p>Connect your ESP32 dev board via USB, click connect, then flash the firmware.</p>
    
    <button id="connectBtn">1. Connect ESP32</button>
    <button id="flashBtn" disabled>2. Flash Firmware</button>

    <h3>Console Output</h3>
    <div id="log"></div>
</div>

</body>
</html>
